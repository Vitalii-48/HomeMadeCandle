<!-- templates/public/catalog.html -->
{% extends "base.html" %}
{% block content %}

<div class="container py-4">

  <h1 class="display-5 mb-4">Каталог</h1>

  <!-- ===== СІТКА ТОВАРІВ ===== -->
  <!-- col-6 на мобільних (2 в ряд), col-md-4 на планшеті (3 в ряд), col-lg-3 на десктопі (4 в ряд) -->
  <div class="row g-3">
    {% for product in products %}
      {% include "partials/product_card.html" %}
    {% else %}
      <!-- Порожній каталог -->
      <div class="col-12 text-center py-5">
        <p class="text-muted mb-3">Наразі товари відсутні.</p>
        <a href="{{ url_for('public.index') }}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i> На головну
        </a>
      </div>
    {% endfor %}
  </div>

</div>
{% endblock %}
