<!-- templates/base.html -->
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HomeMadeCandle{% endblock %}</title>

  <!-- Фавікон -->
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <!-- Або PNG (опційно, для кращої підтримки сучасних браузерів): -->
  <!-- <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}"> -->
  <!-- <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}"> -->

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Власні стилі -->
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body>

  <!-- Шапка сайту (навігація) -->
  {% include 'partials/header.html' %}

  <!-- Основний контент сторінки -->
  <main class="py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Підвал сайту -->
  {% include 'partials/footer.html' %}

  <!-- Bootstrap JS (bundle включає Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Власні скрипти (глобальні) -->
  <script src="{{ url_for('static', filename='js/partials/product_card.js') }}"></script>

  <!-- Блок для скриптів конкретних сторінок -->
  {% block scripts %}{% endblock %}

</body>
</html>
